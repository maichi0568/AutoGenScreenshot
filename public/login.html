<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — ScreenshotAI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#09090b;color:#f1f5f9;font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-card{width:100%;max-width:400px;padding:48px 40px;background:#0f0f14;border:1px solid #1e1e2e;border-radius:20px;box-shadow:0 24px 64px rgba(0,0,0,.4);text-align:center}
.logo{font-size:24px;font-weight:800;background:linear-gradient(135deg,#F06060,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.logo-sub{font-size:13px;color:#52525b;margin-bottom:36px}
.form-group{margin-bottom:16px;text-align:left}
.form-group label{display:block;font-size:13px;color:#a1a1aa;margin-bottom:6px;font-weight:500}
.form-group input{width:100%;padding:12px 16px;background:#18181b;border:1px solid #27272a;border-radius:10px;color:#f1f5f9;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.form-group input:focus{border-color:#F06060}
.login-btn{width:100%;padding:12px;background:linear-gradient(135deg,#F06060,#e04040);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:8px;transition:opacity .2s}
.login-btn:hover{opacity:.9}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.error-msg{color:#f87171;font-size:13px;text-align:center;margin-top:16px;min-height:20px}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">ScreenshotAI</div>
  <div class="logo-sub">App Store Screenshot Generator</div>

  <form id="login-form">
    <div class="form-group">
      <label for="username">Tài khoản</label>
      <input type="text" id="username" name="username" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label for="password">Mật khẩu</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="login-btn" id="login-btn">Đăng nhập</button>
  </form>

  <div class="error-msg" id="error-msg"></div>
</div>

<script>
(async () => {
  try {
    const meRes = await fetch('/api/auth/me');
    if (meRes.ok) { window.location.href = '/'; return; }
  } catch {}
})();

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('error-msg');
  const btn = document.getElementById('login-btn');
  errEl.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Đang đăng nhập...';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
      })
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/';
    } else {
      errEl.textContent = data.error || 'Đăng nhập thất bại';
    }
  } catch {
    errEl.textContent = 'Lỗi kết nối';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Đăng nhập';
  }
});
</script>
</body>
</html>
