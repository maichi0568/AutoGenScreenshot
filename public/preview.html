<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Template Preview — ScreenshotAI</title>
<style>
  :root {
    --bg: #0f0f17;
    --surface: #1a1a2e;
    --surface2: #16213e;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --border: #2d2d4e;
    --success: #22c55e;
    --danger: #ef4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOPBAR ── */
  .topbar {
    height: 56px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    flex-shrink: 0;
  }

  .topbar-logo {
    font-size: 16px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .topbar-sep { width: 1px; height: 24px; background: var(--border); }

  .template-badge {
    background: var(--accent);
    color: white;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  .topbar-right {
    margin-left: auto;
    display: flex;
    gap: 10px;
  }

  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
  }
  .btn-primary:hover { opacity: 0.85; }

  /* ── MAIN LAYOUT ── */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 320px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .section {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .field { margin-bottom: 14px; }

  .field label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .field input[type="text"],
  .field input[type="color"],
  .field select,
  .field textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  .field input[type="color"] {
    height: 40px;
    padding: 4px 8px;
    cursor: pointer;
  }

  .field input:focus,
  .field select:focus,
  .field textarea:focus {
    border-color: var(--accent);
  }

  .field textarea { resize: vertical; min-height: 70px; font-family: inherit; }

  .color-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .color-row input[type="color"] { width: 56px; flex-shrink: 0; }
  .color-row input[type="text"]  { flex: 1; }

  /* CSS editor */
  .css-editor {
    font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
    font-size: 12px;
    line-height: 1.6;
    min-height: 220px;
    white-space: pre;
    overflow-x: auto;
    tab-size: 2;
  }

  .apply-btn {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .apply-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── CANVAS AREA ── */
  .canvas-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: auto;
    background: #09090f;
    padding: 32px;
    gap: 16px;
  }

  .canvas-area::-webkit-scrollbar { width: 6px; height: 6px; }
  .canvas-area::-webkit-scrollbar-track { background: transparent; }
  .canvas-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .zoom-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .zoom-btn {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .zoom-btn:hover { border-color: var(--accent); }

  .zoom-label {
    font-size: 12px;
    color: var(--muted);
    min-width: 40px;
    text-align: center;
  }

  .canvas-size-info {
    font-size: 11px;
    color: var(--muted);
    background: var(--surface);
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* Phone preview wrapper */
  .preview-wrapper {
    position: relative;
    transform-origin: top center;
    transition: transform 0.2s;
  }

  .preview-shadow {
    box-shadow: 0 40px 120px rgba(0,0,0,0.7);
    border-radius: 16px;
    overflow: hidden;
  }

  iframe#preview-frame {
    display: block;
    width: 1242px;
    height: 2688px;
    border: none;
    background: #000;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--success);
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s;
    z-index: 100;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <span class="topbar-logo">ScreenshotAI</span>
  <div class="topbar-sep"></div>
  <span class="template-badge" id="template-name">restyle</span>
  <div class="topbar-right">
    <button class="btn btn-ghost" onclick="window.location='/'">← Back</button>
    <button class="btn btn-primary" onclick="applyAndReload()">▶ Apply Changes</button>
  </div>
</div>

<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <!-- Content Variables -->
    <div class="section">
      <div class="section-title">Content</div>

      <div class="field">
        <label>Title Line 1</label>
        <input type="text" id="title_line1" value="Restyle Photos" oninput="liveUpdate()">
      </div>
      <div class="field">
        <label>Title Line 2</label>
        <input type="text" id="title_line2" value="With AI Magic" oninput="liveUpdate()">
      </div>
      <div class="field">
        <label>Main Image URL</label>
        <input type="text" id="main_image" value="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=800&q=80" oninput="liveUpdate()">
      </div>
      <div class="field">
        <label>Before Image URL</label>
        <input type="text" id="before_image" value="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=300&q=80" oninput="liveUpdate()">
      </div>
    </div>

    <!-- CSS Variables -->
    <div class="section">
      <div class="section-title">Style Variables</div>

      <div class="field">
        <label>Accent Color (viền + chữ + gradient)</label>
        <div class="color-row">
          <input type="color" id="accent_color" value="#F06060" oninput="syncColorText(this,'accent_color_text'); liveUpdate()">
          <input type="text"  id="accent_color_text" value="#F06060" oninput="syncColorPicker(this,'accent_color'); liveUpdate()">
        </div>
      </div>
      <div class="field">
        <label>Background (nền trung tâm)</label>
        <div class="color-row">
          <input type="color" id="bg_dark" value="#000000" oninput="syncColorText(this,'bg_dark_text'); liveUpdate()">
          <input type="text"  id="bg_dark_text" value="#000000" oninput="syncColorPicker(this,'bg_dark'); liveUpdate()">
        </div>
      </div>
      <div class="field">
        <label>Font Size Title (px)</label>
        <input type="text" id="font_size" value="108" oninput="liveUpdate()">
      </div>
      <div class="field">
        <label>Frame Border Width (px)</label>
        <input type="text" id="frame_border" value="14" oninput="liveUpdate()">
      </div>
      <div class="field">
        <label>Frame Border Radius (px)</label>
        <input type="text" id="frame_radius" value="72" oninput="liveUpdate()">
      </div>
      <div class="field">
        <label>Gradient Opacity (0–1)</label>
        <input type="text" id="gradient_opacity" value="0.75" oninput="liveUpdate()">
      </div>
    </div>

    <!-- Raw CSS Override -->
    <div class="section">
      <div class="section-title">CSS Override</div>
      <textarea class="css-editor field" id="css_override" placeholder="/* Thêm CSS tùy chỉnh ở đây */
.title { font-style: italic; }"></textarea>
      <button class="apply-btn" onclick="liveUpdate()">Apply CSS</button>
    </div>

  </div>

  <!-- CANVAS -->
  <div class="canvas-area" id="canvas-area">

    <div class="zoom-bar">
      <button class="zoom-btn" onclick="changeZoom(-0.05)">−</button>
      <span class="zoom-label" id="zoom-label">25%</span>
      <button class="zoom-btn" onclick="changeZoom(0.05)">+</button>
      <button class="zoom-btn" onclick="fitZoom()" title="Fit to screen">⊞</button>
      <span class="canvas-size-info">1242 × 2688 px</span>
    </div>

    <div class="preview-wrapper" id="preview-wrapper">
      <div class="preview-shadow">
        <iframe id="preview-frame" sandbox="allow-same-origin allow-scripts"></iframe>
      </div>
    </div>

  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">✓ Applied</div>

<script>
  // ── State ──
  let zoom = 0.25;
  const TEMPLATE = 'restyle';

  // ── Init ──
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('template-name').textContent = TEMPLATE;
    fitZoom();
    liveUpdate();
  });

  // ── Zoom ──
  function changeZoom(delta) {
    zoom = Math.min(1, Math.max(0.1, zoom + delta));
    applyZoom();
  }

  function fitZoom() {
    const area = document.getElementById('canvas-area');
    const availH = area.clientHeight - 100;
    const availW = area.clientWidth - 64;
    zoom = Math.min(availW / 1242, availH / 2688);
    applyZoom();
  }

  function applyZoom() {
    document.getElementById('preview-wrapper').style.transform = `scale(${zoom})`;
    document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + '%';
    // Adjust wrapper height so scroll works
    const wrapper = document.getElementById('preview-wrapper');
    wrapper.style.marginBottom = `${2688 * zoom - 2688}px`;
  }

  // ── Color sync ──
  function syncColorText(picker, textId) {
    document.getElementById(textId).value = picker.value;
  }
  function syncColorPicker(input, pickerId) {
    const v = input.value;
    if (/^#[0-9a-fA-F]{6}$/.test(v)) {
      document.getElementById(pickerId).value = v;
    }
  }

  // ── Live update ──
  function liveUpdate() {
    const frame = document.getElementById('preview-frame');

    const title1      = esc(v('title_line1'));
    const title2      = esc(v('title_line2'));
    const mainImg     = v('main_image');
    const beforeImg   = v('before_image');
    const accentColor = v('accent_color');
    const bgDark      = v('bg_dark');
    const fontSize    = parseInt(v('font_size'))    || 108;
    const frameBorder = parseInt(v('frame_border')) || 7;
    const frameRadius = parseInt(v('frame_radius')) || 72;
    const gradOpacity = parseFloat(v('gradient_opacity')) || 0.75;
    const cssOverride = document.getElementById('css_override').value;

    const html = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
:root {
  --accent:     ${accentColor};
  --bg:         ${bgDark};
  --title-size: ${fontSize}px;
  --frame-w:    1060px;
  --frame-h:    2432px;
  --frame-r:    ${frameRadius}px;
  --border-w:   ${frameBorder}px;
  --badge-size: 620px;
}
.bg-left { opacity: ${gradOpacity}; }
</style>
<link rel="stylesheet" href="/templates/${TEMPLATE}/styles.css">
<style>${cssOverride}</style>
</head>
<body>
  <div class="bg-left"></div>
  <div class="title-section">
    <h1 class="title">${title1}<br>${title2}</h1>
  </div>
  <div class="phone-area">
    <div class="phone-border-wrap">
      <div class="phone-frame">
        <img class="main-image" src="${mainImg}" alt="main" onerror="this.style.background='#111'"/>
      </div>
    </div>
  </div>

  <div class="before-badge">
    <img class="before-image" src="${beforeImg}" alt="before" onerror="this.style.background='#333'"/>
    <svg class="arrow-icon" viewBox="0 0 80 80" fill="none">
      <path d="M68 65 C68 30, 30 18, 14 14" stroke="white" stroke-width="8" stroke-linecap="round" fill="none"/>
      <path d="M6 24 L16 10 L28 20" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
  </div>
</body>
</html>`;

    frame.srcdoc = html;
  }

  function applyAndReload() {
    liveUpdate();
    showToast('✓ Applied');
  }

  // ── Utils ──
  function v(id) { return document.getElementById(id)?.value || ''; }
  function esc(s) { return s.replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>

</body>
</html>
