<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScreenshotAI Editor</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #0a0a0a;
  color: #f1f5f9;
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Top bar ── */
.topbar {
  height: 56px;
  background: #0f0f17;
  border-bottom: 1px solid #1e1e2e;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
  z-index: 100;
}
.topbar-logo {
  font-size: 18px;
  font-weight: 700;
  background: linear-gradient(135deg, #F06060, #ffffff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-right: 8px;
}
.topbar-sep { width: 1px; height: 24px; background: #1e1e2e; }
.template-tabs { display: flex; gap: 4px; }
.tab-btn {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid transparent;
  background: transparent;
  color: #64748b;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.tab-btn:hover { color: #94a3b8; background: rgba(255,255,255,0.04); }
.tab-btn.active {
  background: rgba(240,96,96,0.12);
  border-color: rgba(240,96,96,0.3);
  color: #F9A3A3;
}
.topbar-spacer { flex: 1; }
.btn-back {
  padding: 7px 16px;
  border-radius: 8px;
  border: 1px solid #1e1e2e;
  background: transparent;
  color: #64748b;
  font-size: 13px;
  cursor: pointer;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.15s;
}
.btn-back:hover { color: #94a3b8; border-color: #2e2e3e; }

/* ── Main layout ── */
.workspace {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: 300px;
  flex-shrink: 0;
  background: #0f0f17;
  border-right: 1px solid #1e1e2e;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: #2e2e3e; border-radius: 2px; }

.sidebar-section {
  padding: 16px 16px 8px;
  border-bottom: 1px solid #1a1a28;
}
.sidebar-section:last-child { border-bottom: none; }
.section-title {
  font-size: 10px;
  font-weight: 600;
  color: #475569;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

/* Field styles */
.field { margin-bottom: 12px; }
.field label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: #64748b;
  margin-bottom: 5px;
}
.field input[type="text"],
.field textarea {
  width: 100%;
  background: #0a0a0f;
  border: 1px solid #1e1e2e;
  border-radius: 8px;
  padding: 8px 10px;
  color: #e2e8f0;
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s;
  resize: vertical;
}
.field input[type="text"]:focus,
.field textarea:focus {
  border-color: rgba(240,96,96,0.4);
}
.field textarea { min-height: 72px; }

/* Image URL field with preview thumbnail */
.img-field { margin-bottom: 12px; }
.img-field label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: #64748b;
  margin-bottom: 5px;
}
.img-field-row { display: flex; gap: 8px; align-items: flex-start; }
.img-thumb {
  width: 44px; height: 44px;
  border-radius: 6px;
  background: #1a1a28;
  border: 1px solid #1e1e2e;
  object-fit: cover;
  flex-shrink: 0;
}
.img-field-row input {
  flex: 1;
  background: #0a0a0f;
  border: 1px solid #1e1e2e;
  border-radius: 8px;
  padding: 8px 10px;
  color: #e2e8f0;
  font-size: 12px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s;
}
.img-field-row input:focus { border-color: rgba(240,96,96,0.4); }

/* Color field */
.color-field { margin-bottom: 12px; }
.color-field label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: #64748b;
  margin-bottom: 5px;
}
.color-row { display: flex; gap: 8px; align-items: center; }
.color-row input[type="color"] {
  width: 36px; height: 36px;
  border: 1px solid #1e1e2e;
  border-radius: 6px;
  background: none;
  cursor: pointer;
  padding: 2px;
}
.color-row input[type="text"] {
  flex: 1;
  background: #0a0a0f;
  border: 1px solid #1e1e2e;
  border-radius: 8px;
  padding: 7px 10px;
  color: #e2e8f0;
  font-size: 12px;
  font-family: 'SF Mono', monospace;
  outline: none;
  transition: border-color 0.15s;
}
.color-row input[type="text"]:focus { border-color: rgba(240,96,96,0.4); }

/* Language selector */
.lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
.lang-item {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 7px; border-radius: 6px;
  cursor: pointer; transition: background 0.1s; user-select: none;
}
.lang-item:hover { background: rgba(255,255,255,0.04); }
.lang-item input[type=checkbox] { accent-color: #F06060; width: 13px; height: 13px; flex-shrink: 0; }
.lang-flag { font-size: 15px; }
.lang-name { font-size: 11px; color: #94a3b8; }

.gen-all-btn {
  width: 100%; margin-top: 10px;
  padding: 10px; border-radius: 8px;
  border: 1px solid rgba(240,96,96,0.5);
  background: rgba(240,96,96,0.15);
  color: #F9A3A3; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: all 0.15s;
}
.gen-all-btn:hover:not(:disabled) { background: rgba(240,96,96,0.25); }
.gen-all-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Batch panel */
.batch-panel {
  flex: 1; overflow: auto; background: #070710;
  padding: 24px 28px; display: none;
}
.batch-panel.visible { display: block; }
.batch-panel-header {
  display: flex; align-items: center; gap: 14px; margin-bottom: 20px;
}
.batch-back-btn {
  padding: 6px 14px; border-radius: 8px; border: 1px solid #1e1e2e;
  background: transparent; color: #64748b; font-size: 12px; cursor: pointer;
  transition: all 0.15s;
}
.batch-back-btn:hover { color: #94a3b8; border-color: #2e2e3e; }
.batch-title { font-size: 14px; color: #94a3b8; font-weight: 600; }
.batch-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}
.batch-card {
  background: #0f0f17; border: 1px solid #1e1e2e;
  border-radius: 10px; overflow: hidden;
}
.batch-card-header {
  padding: 7px 10px; display: flex; align-items: center; gap: 6px;
  border-bottom: 1px solid #1a1a28;
}
.batch-card-flag { font-size: 16px; }
.batch-card-name { font-size: 11px; font-weight: 600; color: #94a3b8; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.batch-status {
  font-size: 10px; padding: 2px 6px; border-radius: 8px; white-space: nowrap;
}
.status-pending    { background: #1a1a28; color: #475569; }
.status-processing { background: rgba(251,191,36,0.15); color: #fbbf24; }
.status-completed  { background: rgba(34,197,94,0.15); color: #22c55e; }
.status-failed     { background: rgba(239,68,68,0.15); color: #ef4444; }
.batch-thumb-wrap { width: 100%; aspect-ratio: 9/16; background: #1a1a28; overflow: hidden; }
.batch-thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.batch-thumb-placeholder {
  width: 100%; height: 100%; display: flex;
  align-items: center; justify-content: center;
  font-size: 28px; color: #2e2e3e;
}
.batch-card-footer { padding: 7px 10px; }
.batch-dl-btn {
  display: block; width: 100%; padding: 5px;
  border-radius: 6px; border: 1px solid #1e1e2e;
  background: transparent; color: #64748b;
  font-size: 11px; text-align: center; text-decoration: none;
  cursor: pointer; transition: all 0.15s;
}
.batch-dl-btn:hover { border-color: rgba(240,96,96,0.4); color: #F9A3A3; }

/* Prompt mode toggle */
.prompt-toggle {
  display: flex; gap: 3px;
  background: #0a0a0f;
  border: 1px solid #1e1e2e;
  border-radius: 7px;
  padding: 3px;
  margin-bottom: 8px;
}
.prompt-toggle-btn {
  flex: 1; padding: 4px 8px;
  border-radius: 5px; border: none;
  background: transparent; color: #475569;
  font-size: 11px; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
}
.prompt-toggle-btn.active {
  background: #1e1e2e; color: #e2e8f0;
}

/* AI Image Gen field */
.gen-field { margin-bottom: 14px; }
.gen-field label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: #64748b;
  margin-bottom: 5px;
}
.gen-field textarea {
  width: 100%;
  background: #0a0a0f;
  border: 1px solid #1e1e2e;
  border-radius: 8px;
  padding: 8px 10px;
  color: #e2e8f0;
  font-size: 12px;
  font-family: inherit;
  outline: none;
  resize: vertical;
  min-height: 64px;
  transition: border-color 0.15s;
}
.gen-field textarea:focus { border-color: rgba(240,96,96,0.4); }
.gen-btn-row { display: flex; gap: 8px; align-items: center; margin-top: 6px; }
.gen-btn {
  flex: 1;
  padding: 7px 12px;
  border-radius: 8px;
  border: 1px solid rgba(240,96,96,0.4);
  background: rgba(240,96,96,0.1);
  color: #F9A3A3;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.gen-btn:hover:not(:disabled) { background: rgba(240,96,96,0.2); }
.gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.gen-status { font-size: 11px; color: #475569; }
.gen-result { display: flex; gap: 8px; align-items: center; margin-top: 6px; }
.gen-thumb {
  width: 44px; height: 44px;
  border-radius: 6px;
  background: #1a1a28;
  border: 1px solid #1e1e2e;
  object-fit: cover;
  flex-shrink: 0;
}
.gen-url-input {
  flex: 1;
  background: #0a0a0f;
  border: 1px solid #1e1e2e;
  border-radius: 8px;
  padding: 7px 10px;
  color: #64748b;
  font-size: 11px;
  font-family: 'SF Mono', monospace;
  outline: none;
}

/* Zoom controls */
.zoom-bar {
  padding: 12px 16px;
  border-top: 1px solid #1a1a28;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: auto;
}
.zoom-label { font-size: 12px; color: #475569; }
.zoom-value { font-size: 12px; color: #94a3b8; min-width: 36px; text-align: center; }
.zoom-btn {
  width: 28px; height: 28px;
  border-radius: 6px;
  border: 1px solid #1e1e2e;
  background: transparent;
  color: #64748b;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.zoom-btn:hover { color: #e2e8f0; border-color: #2e2e3e; }

/* ── Preview area ── */
.preview-area {
  flex: 1;
  overflow: auto;
  background: #070710;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 32px;
}
.preview-area::-webkit-scrollbar { width: 6px; height: 6px; }
.preview-area::-webkit-scrollbar-track { background: transparent; }
.preview-area::-webkit-scrollbar-thumb { background: #1e1e2e; border-radius: 3px; }

.preview-wrapper {
  position: relative;
  box-shadow: 0 32px 80px rgba(0,0,0,0.7);
  border-radius: 12px;
  overflow: hidden;
  flex-shrink: 0;
  transition: width 0.2s, height 0.2s;
}
.preview-wrapper iframe {
  width: 1080px;
  height: 1920px;
  border: none;
  display: block;
  transform-origin: top left;
}
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-logo">ScreenshotAI</div>
  <div class="topbar-sep"></div>
  <div class="template-tabs">
    <button class="tab-btn" data-t="1" onclick="switchTemplate(1)">Template 1</button>
    <button class="tab-btn" data-t="2" onclick="switchTemplate(2)">Template 2</button>
    <button class="tab-btn" data-t="3" onclick="switchTemplate(3)">Template 3</button>
    <button class="tab-btn" data-t="tmpl1" onclick="switchTemplate('tmpl1')">Template 1 (New)</button>
    <button class="tab-btn" data-t="tmpl4" onclick="switchTemplate('tmpl4')">Template 4</button>
  </div>
  <div class="topbar-spacer"></div>
  <a class="btn-back" href="/">&#8592; All Templates</a>
</div>

<!-- Workspace -->
<div class="workspace">

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <!-- Fields injected by JS -->
    <div class="zoom-bar">
      <span class="zoom-label">Zoom</span>
      <button class="zoom-btn" onclick="changeZoom(-0.05)">&#8722;</button>
      <span class="zoom-value" id="zoom-val">30%</span>
      <button class="zoom-btn" onclick="changeZoom(0.05)">&#43;</button>
      <button class="zoom-btn" onclick="fitZoom()" title="Fit" style="font-size:11px;width:auto;padding:0 8px;">Fit</button>
    </div>
  </div>

  <!-- Preview -->
  <div class="preview-area" id="preview-area">
    <div class="preview-wrapper" id="preview-wrapper">
      <iframe id="preview-iframe" sandbox="allow-same-origin allow-scripts"></iframe>
    </div>
  </div>

  <!-- Batch results panel -->
  <div class="batch-panel" id="batch-panel">
    <div class="batch-panel-header">
      <button class="batch-back-btn" onclick="closeBatch()">&#8592; Back to Editor</button>
      <span class="batch-title">Generated Screenshots</span>
    </div>
    <div class="batch-grid" id="batch-results-grid"></div>
  </div>

</div>

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Sidebar rendering ──────────────────────────────────────────────────
function renderSidebar(t) {
  const sidebar = document.getElementById('sidebar');
  const zoomBar = sidebar.querySelector('.zoom-bar');
  // Clear all except zoom bar
  while (sidebar.firstChild && sidebar.firstChild !== zoomBar) {
    sidebar.removeChild(sidebar.firstChild);
  }

  const defs = FIELDS[t];
  const v = VALUES[t];

  defs.forEach(group => {
    const sec = document.createElement('div');
    sec.className = 'sidebar-section';
    sec.innerHTML = `<div class="section-title">${group.section}</div>`;

    group.fields.forEach(f => {
      if (f.type === 'text') {
        const d = document.createElement('div');
        d.className = 'field';
        d.innerHTML = `<label>${f.label}</label>
          <input type="text" value="${esc(v[f.key])}" data-key="${f.key}"/>`;
        d.querySelector('input').addEventListener('input', e => {
          VALUES[t][f.key] = e.target.value;
          updatePreview();
        });
        sec.appendChild(d);
      } else if (f.type === 'textarea') {
        const d = document.createElement('div');
        d.className = 'field';
        d.innerHTML = `<label>${f.label}</label>
          <textarea data-key="${f.key}" placeholder="${f.placeholder || ''}">${esc(v[f.key])}</textarea>`;
        d.querySelector('textarea').addEventListener('input', e => {
          VALUES[t][f.key] = e.target.value;
          updatePreview();
        });
        sec.appendChild(d);
      } else if (f.type === 'image') {
        const d = document.createElement('div');
        d.className = 'img-field';
        const thumbId = 'thumb_' + f.key;
        d.innerHTML = `<label>${f.label}</label>
          <div class="img-field-row">
            <img class="img-thumb" id="${thumbId}" src="${esc(v[f.key])}" onerror="this.style.background='#1a1a28';this.src=''"/>
            <input type="text" value="${esc(v[f.key])}" data-key="${f.key}" placeholder="https://..."/>
          </div>`;
        d.querySelector('input').addEventListener('input', e => {
          VALUES[t][f.key] = e.target.value;
          const thumb = document.getElementById(thumbId);
          if (thumb) { thumb.src = e.target.value; }
          updatePreview();
        });
        sec.appendChild(d);
      } else if (f.type === 'image-gen') {
        const d = document.createElement('div');
        d.className = 'gen-field';
        const thumbId = 'genthumb_' + f.key;
        const btnId   = 'genbtn_'   + f.key;
        const statusId = 'genstatus_' + f.key;
        const promptVal = v[f.promptKey] || f.promptDefault || '';
        const imgVal    = v[f.key] || '';
        // Init mode state
        if (!imgModes[f.key]) imgModes[f.key] = 'default';

        const modeToggle = f.hidePrompt ? `
          <div class="prompt-toggle">
            <button class="prompt-toggle-btn ${imgModes[f.key]==='default'?'active':''}" id="modbtn_default_${f.key}" onclick="setImgMode('${f.key}','default',this)">Default</button>
            <button class="prompt-toggle-btn ${imgModes[f.key]==='custom'?'active':''}" id="modbtn_custom_${f.key}" onclick="setImgMode('${f.key}','custom',this)">Custom</button>
          </div>` : '';

        const customPromptHtml = `<textarea id="genprompt_${f.key}" placeholder="Mô tả ảnh muốn gen..." style="display:${f.hidePrompt && imgModes[f.key]==='default' ? 'none' : 'block'}">${esc(f.hidePrompt ? (v[f.promptKey]||'') : promptVal)}</textarea>`;

        d.innerHTML = `<label>${f.label}</label>
          ${modeToggle}
          ${customPromptHtml}
          <div class="gen-btn-row">
            <button class="gen-btn" id="${btnId}">&#9889; Generate</button>
            <span class="gen-status" id="${statusId}"></span>
          </div>
          <div class="gen-result">
            <img class="gen-thumb" id="${thumbId}" src="${esc(imgVal)}" onerror="this.style.background='#1a1a28';this.src=''"/>
            <input class="gen-url-input" type="text" readonly value="${esc(imgVal)}" placeholder="URL sẽ hiện ở đây sau khi gen"/>
          </div>`;
        // Update prompt value on change (only visible in custom mode)
        const ta = d.querySelector('textarea');
        if (ta) ta.addEventListener('input', e => { VALUES[t][f.promptKey] = e.target.value; });
        // Generate button
        d.querySelector('#' + btnId).addEventListener('click', async () => {
          const isDefault = f.hidePrompt && imgModes[f.key] === 'default';
          const prompt = isDefault
            ? (DEFAULTS[t]?.[f.promptKey] || '')
            : (document.getElementById('genprompt_' + f.key)?.value.trim() || VALUES[t][f.promptKey] || '');
          if (!prompt) return;
          const btn    = document.getElementById(btnId);
          const status = document.getElementById(statusId);
          const thumb  = document.getElementById(thumbId);
          const urlInput = d.querySelector('.gen-url-input');
          btn.disabled = true;
          btn.textContent = 'Generating...';
          status.textContent = 'Đang gen ảnh...';
          try {
            const res = await fetch('/api/gen-image', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ prompt, aspectRatio: f.aspectRatio || '9:16' })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Failed');
            VALUES[t][f.key] = data.url;
            thumb.src = data.url;
            urlInput.value = data.url;
            status.textContent = 'Done!';
            updatePreview();
          } catch (err) {
            status.textContent = 'Lỗi: ' + err.message;
          } finally {
            btn.disabled = false;
            btn.innerHTML = '&#9889; Generate';
            setTimeout(() => { if (status.textContent === 'Done!') status.textContent = ''; }, 3000);
          }
        });
        sec.appendChild(d);
      } else if (f.type === 'color') {
        const d = document.createElement('div');
        d.className = 'color-field';
        const hexVal = v[f.key];
        d.innerHTML = `<label>${f.label}</label>
          <div class="color-row">
            <input type="color" value="${hexVal}" data-key="${f.key}"/>
            <input type="text" value="${hexVal}" data-key="${f.key}" maxlength="9"/>
          </div>`;
        const [cpick, ctxt] = d.querySelectorAll('input');
        cpick.addEventListener('input', e => {
          VALUES[t][f.key] = e.target.value;
          ctxt.value = e.target.value;
          updatePreview();
        });
        ctxt.addEventListener('input', e => {
          VALUES[t][f.key] = e.target.value;
          if (/^#[0-9a-fA-F]{6}$/.test(e.target.value)) {
            cpick.value = e.target.value;
          }
          updatePreview();
        });
        sec.appendChild(d);
      }
    });

    sidebar.insertBefore(sec, zoomBar);
  });

  // Language selector — all templates with batch generation
  if (['tmpl1','tmpl4','hair','mockup','i2i','multistyle','filter','2i2i','2i2i1','makeup','ti2v','i2i1'].includes(t)) {
    const langSec = document.createElement('div');
    langSec.className = 'sidebar-section';
    langSec.innerHTML = `<div class="section-title">Languages</div><div class="lang-grid" id="lang-grid"></div>`;

    const genAllBtn = document.createElement('button');
    genAllBtn.className = 'gen-all-btn';
    genAllBtn.id = 'gen-all-btn';
    genAllBtn.textContent = 'Generate All Screenshots';
    genAllBtn.onclick = startBatch;
    langSec.appendChild(genAllBtn);

    sidebar.insertBefore(langSec, zoomBar);

    const grid = langSec.querySelector('#lang-grid');
    LANGUAGES.forEach(lang => {
      const item = document.createElement('label');
      item.className = 'lang-item';
      item.innerHTML = `<input type="checkbox" ${selectedLangs.has(lang.code) ? 'checked' : ''} data-code="${lang.code}"/>
        <span class="lang-flag">${lang.flag}</span>
        <span class="lang-name">${lang.name}</span>`;
      item.querySelector('input').addEventListener('change', e => {
        if (e.target.checked) selectedLangs.add(lang.code);
        else selectedLangs.delete(lang.code);
      });
      grid.appendChild(item);
    });
  }
}

// ── Preview ────────────────────────────────────────────────────────────
let previewTimer = null;
function updatePreview() {
  clearTimeout(previewTimer);
  previewTimer = setTimeout(_doUpdatePreview, 80);
}

function _doUpdatePreview() {
  const iframe = document.getElementById('preview-iframe');
  const v = VALUES[currentT];
  let html;
  if (currentT === 1) html = buildT1(v);
  else if (currentT === 2) html = buildT2(v);
  else if (currentT === 3) html = buildT3(v);
  else if (currentT === 'tmpl1') html = buildTmpl1(v);
  else if (currentT === 'tmpl4') html = buildTmpl4(v);
  iframe.srcdoc = html;
}

// ── Zoom ───────────────────────────────────────────────────────────────
function applyZoom() {
  const wrapper = document.getElementById('preview-wrapper');
  const iframe = document.getElementById('preview-iframe');
  const w = Math.round(1080 * zoom);
  const h = Math.round(1920 * zoom);
  wrapper.style.width = w + 'px';
  wrapper.style.height = h + 'px';
  iframe.style.transform = `scale(${zoom})`;
  document.getElementById('zoom-val').textContent = Math.round(zoom * 100) + '%';
}

function changeZoom(delta) {
  zoom = Math.min(1, Math.max(0.1, zoom + delta));
  applyZoom();
}

function fitZoom() {
  const area = document.getElementById('preview-area');
  const availW = area.clientWidth - 64;
  const availH = area.clientHeight - 64;
  zoom = Math.min(availW / 1080, availH / 1920);
  zoom = Math.round(zoom * 20) / 20; // snap to 5%
  applyZoom();
}

// ── Switch template ────────────────────────────────────────────────────
function switchTemplate(t) {
  currentT = t;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.t == t);
  });
  renderSidebar(t);
  updatePreview();
}

// ── Prompt mode toggle ─────────────────────────────────────────────────
function setImgMode(key, mode, btn) {
  imgModes[key] = mode;
  // Update toggle button styles
  const parent = btn.closest('.prompt-toggle');
  parent.querySelectorAll('.prompt-toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // Show/hide textarea
  const ta = document.getElementById('genprompt_' + key);
  if (ta) ta.style.display = mode === 'custom' ? 'block' : 'none';
}

// ── Batch generation ───────────────────────────────────────────────────
async function startBatch() {
  const langs = LANGUAGES.filter(l => selectedLangs.has(l.code));
  if (!langs.length) { alert('Chọn ít nhất 1 ngôn ngữ'); return; }

  const btn = document.getElementById('gen-all-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Starting...'; }

  // Switch to batch panel
  document.getElementById('preview-area').style.display = 'none';
  const panel = document.getElementById('batch-panel');
  panel.classList.add('visible');

  // Build cards
  const grid = document.getElementById('batch-results-grid');
  grid.innerHTML = '';
  langs.forEach(lang => {
    const card = document.createElement('div');
    card.className = 'batch-card';
    card.id = `bcard-${lang.code}`;
    card.innerHTML = `
      <div class="batch-card-header">
        <span class="batch-card-flag">${lang.flag}</span>
        <span class="batch-card-name">${lang.name}</span>
        <span class="batch-status status-pending" id="bstatus-${lang.code}">pending</span>
      </div>
      <div class="batch-thumb-wrap">
        <div class="batch-thumb-placeholder" id="bthumb-${lang.code}">🌐</div>
      </div>
      <div class="batch-card-footer">
        <span id="bdl-${lang.code}" style="display:none">
          <a class="batch-dl-btn" id="bdl-link-${lang.code}" href="#" target="_blank">⬇ Download</a>
        </span>
      </div>`;
    grid.appendChild(card);
  });

  // Start batch API call
  try {
    const res = await fetch('/api/gen-batch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ languages: langs, values: VALUES[currentT], templateCode: currentT })
    });
    const data = await res.json();
    activeBatchId = data.batchId;
    if (btn) btn.textContent = 'Generating...';
    pollBatch();
  } catch (err) {
    if (btn) { btn.disabled = false; btn.textContent = 'Generate All Screenshots'; }
    alert('Error: ' + err.message);
  }
}

function pollBatch() {
  if (batchPollTimer) clearInterval(batchPollTimer);
  batchPollTimer = setInterval(async () => {
    try {
      const res = await fetch(`/api/batch/${activeBatchId}`);
      const batch = await res.json();

      batch.jobs.forEach(job => {
        const statusEl = document.getElementById(`bstatus-${job.code}`);
        const thumbWrap = document.getElementById(`bthumb-${job.code}`);
        const dlWrap    = document.getElementById(`bdl-${job.code}`);
        const dlLink    = document.getElementById(`bdl-link-${job.code}`);
        if (!statusEl) return;

        statusEl.className = `batch-status status-${job.status}`;
        const labels = { pending: 'pending', processing: '⚙ gen...', completed: 'done', failed: 'failed' };
        statusEl.textContent = labels[job.status] || job.status;

        if (job.status === 'completed' && job.url && thumbWrap) {
          thumbWrap.innerHTML = `<img src="${job.url}?t=${Date.now()}" loading="lazy"/>`;
          if (dlWrap)  dlWrap.style.display = 'block';
          if (dlLink)  dlLink.href = job.url;
        } else if (job.status === 'processing' && thumbWrap?.children[0]) {
          thumbWrap.children[0].textContent = '⚙️';
        } else if (job.status === 'failed' && thumbWrap?.children[0]) {
          thumbWrap.children[0].textContent = '❌';
        }
      });

      if (batch.status === 'completed') {
        clearInterval(batchPollTimer);
        const btn = document.getElementById('gen-all-btn');
        if (btn) { btn.disabled = false; btn.textContent = 'Generate All Screenshots'; }
      }
    } catch (e) { /* ignore poll errors */ }
  }, 2000);
}

function closeBatch() {
  if (batchPollTimer) clearInterval(batchPollTimer);
  document.getElementById('batch-panel').classList.remove('visible');
  document.getElementById('preview-area').style.display = '';
}

// ── Init ───────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  // Read ?t= param
  const params = new URLSearchParams(location.search);
  const tParam = params.get('t');
  const validTs = [1, 2, 3, 'tmpl1', 'tmpl4'];
  const tNum = parseInt(tParam);
  currentT = (tParam === 'tmpl1' || tParam === 'tmpl4') ? tParam : (validTs.includes(tNum) ? tNum : 1);

  applyZoom();
  switchTemplate(currentT);
  updatePreview();

  // Auto-fit on load after a tick
  setTimeout(fitZoom, 100);
});
</script>
