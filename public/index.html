<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScreenshotAI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#09090b;color:#f1f5f9;font-family:'Inter',system-ui,sans-serif;min-height:100vh}

/* ===== HEADER ===== */
.header{padding:32px 40px 0;max-width:960px;margin:0 auto}
.logo{font-size:22px;font-weight:800;background:linear-gradient(135deg,#F06060,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:13px;color:#52525b;margin-top:2px}

/* ===== SEARCH ===== */
.search-wrap{max-width:960px;margin:28px auto 0;padding:0 40px}
.search-box{position:relative}
.search-box svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:#52525b;pointer-events:none}
.search-input{width:100%;padding:14px 16px 14px 46px;background:#111113;border:1px solid #27272a;border-radius:12px;color:#f1f5f9;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s}
.search-input:focus{border-color:rgba(240,96,96,.5);box-shadow:0 0 0 3px rgba(240,96,96,.1)}
.search-input::placeholder{color:#52525b}

/* ===== CONTENT ===== */
.content{max-width:960px;margin:0 auto;padding:24px 40px 120px}

/* ===== SECTION LABEL ===== */
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:#52525b;margin:28px 0 14px;padding-left:4px}

/* ===== GROUP CHIPS ===== */
.group-chips{display:flex;flex-wrap:wrap;gap:10px}
.group-chip{display:flex;align-items:center;gap:10px;padding:12px 18px;background:#111113;border:1px solid #27272a;border-radius:12px;cursor:pointer;transition:all .2s;user-select:none}
.group-chip:hover{border-color:rgba(240,96,96,.35);background:#151518}
.group-chip.active{border-color:#F06060;background:rgba(240,96,96,.08)}
.group-chip-icon{font-size:22px;flex-shrink:0}
.group-chip-text{min-width:0}
.group-chip-name{font-size:14px;font-weight:600;color:#e4e4e7}
.group-chip-count{font-size:11px;color:#52525b;margin-top:1px}
.group-chip.hide{display:none}

/* ===== FEATURE LIST ===== */
.feature-section{margin-top:20px;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.feature-search-wrap{margin-bottom:14px;position:relative}
.feature-search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#52525b;pointer-events:none}
.feature-search{width:100%;padding:11px 14px 11px 40px;background:#111113;border:1px solid #27272a;border-radius:10px;color:#f1f5f9;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.feature-search:focus{border-color:rgba(240,96,96,.5)}
.feature-search::placeholder{color:#3f3f46}

.feature-list{display:flex;flex-direction:column;gap:6px}
.feature-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:#111113;border:1px solid #27272a;border-radius:12px;cursor:pointer;transition:all .2s;user-select:none}
.feature-item:hover{border-color:rgba(240,96,96,.3);background:#151518}
.feature-item.checked{border-color:#F06060;background:rgba(240,96,96,.06)}
.feature-item.hide{display:none}

.f-check{width:22px;height:22px;border-radius:6px;border:2px solid #3f3f46;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.feature-item.checked .f-check{border-color:#F06060;background:#F06060}
.f-check svg{opacity:0;transition:opacity .15s}
.feature-item.checked .f-check svg{opacity:1}

.f-icon{font-size:20px;flex-shrink:0}
.f-info{flex:1;min-width:0}
.f-name{font-size:14px;font-weight:600;color:#e4e4e7}
.f-desc{font-size:12px;color:#52525b;margin-top:1px}
.f-badge{padding:3px 10px;background:#18181b;border:1px solid #27272a;border-radius:8px;font-size:11px;font-weight:600;color:#71717a;flex-shrink:0}

/* ===== TEMPLATE PREVIEW (expanded under feature) ===== */
.tpl-expand{overflow:hidden;max-height:0;transition:max-height .35s ease,opacity .25s ease;opacity:0;margin-top:0}
.tpl-expand.open{max-height:800px;opacity:1;margin-top:10px}
.tpl-row{display:flex;gap:12px;padding:8px 0 8px 52px;overflow-x:auto}
.tpl-card{flex-shrink:0;width:140px;background:#111113;border:2px solid #27272a;border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.tpl-card:hover{border-color:rgba(240,96,96,.5);transform:translateY(-2px)}
.tpl-card.selected{border-color:#F06060;background:rgba(240,96,96,.04)}
.tpl-card-check{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.25);background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:2;transition:all .2s}
.tpl-card.selected .tpl-card-check{border-color:#F06060;background:#F06060}
.tpl-card-check svg{opacity:0;transition:opacity .15s}
.tpl-card.selected .tpl-card-check svg{opacity:1}
.tpl-card-preview{width:100%;aspect-ratio:9/16;background:#000;overflow:hidden;position:relative}
.tpl-card-preview iframe{width:1080px;height:1920px;border:none;transform-origin:top left;pointer-events:none}
.tpl-card-footer{padding:10px 12px;border-top:1px solid #1e1e2e}
.tpl-card-name{font-size:12px;font-weight:600;color:#a1a1aa}

/* ===== BOTTOM BAR ===== */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:16px 40px;background:rgba(9,9,11,.92);backdrop-filter:blur(12px);border-top:1px solid #27272a;display:flex;align-items:center;justify-content:space-between;transform:translateY(100%);transition:transform .3s ease;z-index:100}
.bottom-bar.visible{transform:translateY(0)}
.bottom-bar-info{font-size:14px;color:#a1a1aa}
.bottom-bar-info strong{color:#f1f5f9}
.bottom-bar-tags{display:flex;gap:6px;flex-wrap:wrap;margin-left:16px;flex:1}
.bottom-bar-tag{padding:4px 10px;background:rgba(240,96,96,.1);border:1px solid rgba(240,96,96,.2);border-radius:6px;font-size:11px;font-weight:600;color:#F9A3A3}
.btn-edit-sel{padding:12px 36px;background:linear-gradient(135deg,#F06060,#c44040);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 6px 24px rgba(240,96,96,.3);flex-shrink:0}
.btn-edit-sel:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(240,96,96,.4)}

/* ===== EMPTY ===== */
.empty{text-align:center;padding:48px 20px;color:#3f3f46;font-size:14px}

/* ===== GENERATE FROM IMAGE ===== */
.ref-gen-section{margin-bottom:28px}
.ref-gen-card{background:#111113;border:1.5px dashed #27272a;border-radius:14px;padding:28px;transition:all .25s;cursor:pointer}
.ref-gen-card:hover{border-color:rgba(240,96,96,.4)}
.ref-gen-card.has-file{border-style:solid;border-color:rgba(240,96,96,.3);cursor:default}
.ref-gen-header{display:flex;align-items:center;gap:14px}
.ref-gen-icon{width:44px;height:44px;border-radius:12px;background:rgba(240,96,96,.1);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ref-gen-title{font-size:15px;font-weight:700;color:#f1f5f9}
.ref-gen-desc{font-size:12px;color:#52525b;margin-top:2px}
.ref-gen-body{margin-top:20px;display:none}
.ref-gen-card.has-file .ref-gen-body{display:block}
.ref-gen-preview-row{display:flex;gap:16px;align-items:flex-start}
.ref-gen-thumb{width:120px;height:213px;border-radius:10px;overflow:hidden;background:#000;flex-shrink:0;position:relative}
.ref-gen-thumb img{width:100%;height:100%;object-fit:cover}
.ref-gen-thumb .remove-btn{position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.2);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;line-height:1}
.ref-gen-thumb .remove-btn:hover{background:#F06060}
.ref-gen-controls{flex:1;display:flex;flex-direction:column;gap:12px}
.ref-gen-controls input,.ref-gen-controls select{padding:10px 14px;background:#0c0c10;border:1px solid #27272a;border-radius:8px;color:#f1f5f9;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.ref-gen-controls input:focus,.ref-gen-controls select:focus{border-color:rgba(240,96,96,.5)}
.ref-gen-controls input::placeholder{color:#3f3f46}
.ref-gen-controls label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#52525b}
.btn-generate{padding:12px 28px;background:linear-gradient(135deg,#F06060,#c44040);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(240,96,96,.25)}
.btn-generate:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(240,96,96,.35)}
.btn-generate:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.ref-gen-result{margin-top:16px;display:none}
.ref-gen-result.show{display:block}
.ref-gen-result-row{display:flex;gap:16px;align-items:flex-start}
.ref-gen-result-img{width:180px;border-radius:10px;overflow:hidden;background:#000}
.ref-gen-result-img img{width:100%;display:block}
.ref-gen-result-actions{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.btn-download{padding:8px 20px;background:#18181b;border:1px solid #27272a;border-radius:8px;color:#a1a1aa;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;text-align:center;transition:all .15s}
.btn-download:hover{border-color:#3f3f46;color:#f1f5f9}
.ref-gen-spinner{display:inline-flex;align-items:center;gap:8px;color:#a1a1aa;font-size:13px}
.ref-gen-spinner .dot{width:6px;height:6px;border-radius:50%;background:#F06060;animation:pulse 1s infinite}
.ref-gen-spinner .dot:nth-child(2){animation-delay:.2s}
.ref-gen-spinner .dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

/* ===== RESPONSIVE ===== */
@media(max-width:640px){
  .header,.search-wrap,.content{padding-left:20px;padding-right:20px}
  .group-chips{gap:8px}
  .tpl-row{padding-left:36px}
  .ref-gen-preview-row{flex-direction:column}
  .ref-gen-thumb{width:100%;height:200px}
}
</style>
</head>
<body>

<div class="header" style="display:flex;align-items:center;gap:16px">
  <div style="flex:1">
    <div class="logo">ScreenshotAI</div>
    <div class="logo-sub">App Store Screenshot Generator</div>
  </div>
  <a href="/admin.html" id="admin-link" class="header-btn" style="display:none">Admin</a>
  <div id="user-info" class="user-info" style="display:none">
    <img id="user-avatar" class="user-avatar" src="" alt="">
    <span id="user-name"></span>
  </div>
  <button onclick="doLogout()" class="header-btn header-btn-logout">Logout</button>
</div>
<style>
.header-btn{padding:7px 16px;border-radius:8px;border:1px solid #27272a;background:transparent;color:#a1a1aa;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;font-family:inherit;transition:all .15s}
.header-btn:hover{border-color:#3f3f46;color:#f1f5f9}
.header-btn-logout{border-color:rgba(248,113,113,.3);color:#f87171}
.header-btn-logout:hover{background:rgba(248,113,113,.1);border-color:#f87171}
.user-info{display:flex;align-items:center;gap:8px;padding:4px 12px 4px 4px;border:1px solid #27272a;border-radius:20px;font-size:12px;font-weight:500;color:#a1a1aa}
.user-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover}
</style>

<div class="search-wrap">
  <div class="search-box">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" class="search-input" id="global-search" placeholder="Search groups or features..." oninput="onGlobalSearch(this.value)">
  </div>
</div>

<div class="content">
  <!-- Generate from Reference Image -->
  <div class="ref-gen-section">
    <input type="file" id="ref-file-input" accept="image/*" style="display:none" onchange="onRefFileSelected(this)">
    <div class="ref-gen-card" id="ref-gen-card" onclick="triggerRefUpload(event)">
      <div class="ref-gen-header">
        <div class="ref-gen-icon">🖼</div>
        <div>
          <div class="ref-gen-title">Generate from Reference Image</div>
          <div class="ref-gen-desc">Upload a screenshot/template and AI will generate a new version with the same style</div>
        </div>
      </div>
      <div class="ref-gen-body">
        <div class="ref-gen-preview-row">
          <div class="ref-gen-thumb">
            <img id="ref-thumb-img" src="">
            <div class="remove-btn" onclick="clearRefImage(event)">&times;</div>
          </div>
          <div class="ref-gen-controls">
            <div>
              <label>Extra prompt (optional)</label>
              <input type="text" id="ref-extra-prompt" placeholder="e.g. change model to Asian girl, blue background...">
            </div>
            <div>
              <label>Aspect Ratio</label>
              <select id="ref-aspect-ratio">
                <option value="9:16" selected>9:16 (Portrait)</option>
                <option value="16:9">16:9 (Landscape)</option>
                <option value="1:1">1:1 (Square)</option>
                <option value="3:4">3:4</option>
                <option value="4:3">4:3</option>
              </select>
            </div>
            <button class="btn-generate" id="btn-ref-gen" onclick="doRefGenerate(event)">Generate New Image</button>
            <div id="ref-gen-status"></div>
          </div>
        </div>
        <div class="ref-gen-result" id="ref-gen-result">
          <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#52525b;margin-bottom:10px">Generated Assets</div>
          <!-- Tagline -->
          <div id="ref-result-tagline-wrap" style="margin-bottom:16px">
            <div style="font-size:11px;color:#52525b;margin-bottom:4px">TAGLINE</div>
            <div id="ref-result-tagline" style="font-size:18px;font-weight:700;color:#f1f5f9;padding:12px 16px;background:#18181b;border:1px solid #27272a;border-radius:10px;white-space:pre-line"></div>
            <div id="ref-result-tagline-orig" style="font-size:11px;color:#3f3f46;margin-top:4px"></div>
          </div>
          <!-- Images -->
          <div style="font-size:11px;color:#52525b;margin-bottom:8px">IMAGES</div>
          <div id="ref-result-images" style="display:flex;gap:12px;flex-wrap:wrap"></div>
          <!-- Actions -->
          <div style="margin-top:16px;display:flex;gap:8px">
            <button class="btn-generate" onclick="doRefGenerate(event)" style="font-size:13px;padding:10px 24px">Regenerate All</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Groups -->
  <div class="section-label">Categories</div>
  <div class="group-chips" id="group-chips"></div>

  <!-- Features (shown when group selected) -->
  <div id="feature-area"></div>
</div>

<!-- ===== BOTTOM BAR ===== -->
<div class="bottom-bar" id="bottom-bar">
  <div style="display:flex;align-items:center;flex:1;min-width:0">
    <div class="bottom-bar-info"><strong id="sel-count">0</strong> template(s)</div>
    <div class="bottom-bar-tags" id="sel-tags"></div>
  </div>
  <button class="btn-edit-sel" onclick="goEdit()">Edit Selected</button>
</div>

<script>
// ===== DATA (loaded from API) =====
let DATA = [
  {
    id: 'ai_photo_video',
    name: 'AI Photo & Video',
    icon: '📸',
    features: [
      { id: 'hair_style', name: 'Hair Style', desc: 'AI hairstyle transformation', icon: '💇',
        templates: [
          { code: 't1', name: 'Template 1', size: '1080×1920' },
          { code: 't2', name: 'Template 2', size: '1080×1920' },
          { code: 't3', name: 'Template 3', size: '1080×1920' },
        ]
      },
      { id: 'make_up', name: 'Make Up', desc: 'AI makeup & beauty filters', icon: '💄',
        templates: [
          { code: 'tmpl1', name: 'Template 1 (New)', size: '1080×1920' },
          { code: 'tmpl4', name: 'Template 4', size: '1080×1920' },
        ]
      },
      { id: 'photo_enhance', name: 'Photo Enhance', desc: 'AI photo enhancement & HDR', icon: '✨',
        templates: [
          { code: 'restyle', name: 'Restyle', size: '1242×2688' },
        ]
      },
      { id: 'ai_avatar', name: 'AI Avatar', desc: 'Generate AI-powered avatars', icon: '🤖',
        templates: [
          { code: 'tmpl1', name: 'Template 1 (New)', size: '1080×1920' },
        ]
      },
      { id: 'bg_remove', name: 'Background Remove', desc: 'AI background removal', icon: '🖼',
        templates: [
          { code: 'restyle', name: 'Restyle', size: '1242×2688' },
          { code: 'minimal', name: 'Minimal', size: '1242×2688' },
        ]
      },
    ]
  },
  {
    id: 'caller_id',
    name: 'Caller ID',
    icon: '📞',
    features: [
      { id: 'caller_lookup', name: 'Caller Lookup', desc: 'Identify unknown callers', icon: '🔍',
        templates: [
          { code: 'bold', name: 'Bold', size: '1242×2688' },
          { code: 'minimal', name: 'Minimal', size: '1242×2688' },
        ]
      },
      { id: 'spam_block', name: 'Spam Blocker', desc: 'Block spam & robocalls', icon: '🚫',
        templates: [
          { code: 'bold', name: 'Bold', size: '1242×2688' },
        ]
      },
      { id: 'call_record', name: 'Call Recording', desc: 'Record & transcribe calls', icon: '🎙',
        templates: [
          { code: 'lifestyle', name: 'Lifestyle', size: '1242×2688' },
          { code: 'minimal', name: 'Minimal', size: '1242×2688' },
        ]
      },
    ]
  },
  {
    id: 'utility',
    name: 'Utility & Tools',
    icon: '🛠',
    features: [
      { id: 'vpn', name: 'VPN', desc: 'Secure & private browsing', icon: '🔒',
        templates: [
          { code: 'bold', name: 'Bold', size: '1242×2688' },
          { code: 'lifestyle', name: 'Lifestyle', size: '1242×2688' },
        ]
      },
      { id: 'cleaner', name: 'Phone Cleaner', desc: 'Storage & memory optimization', icon: '🧹',
        templates: [
          { code: 'minimal', name: 'Minimal', size: '1242×2688' },
        ]
      },
    ]
  },
  {
    id: 'social',
    name: 'Social & Entertainment',
    icon: '🎭',
    features: [
      { id: 'face_swap', name: 'Face Swap', desc: 'AI face swapping for fun', icon: '🎭',
        templates: [
          { code: 'tmpl4', name: 'Template 4', size: '1080×1920' },
          { code: 't3', name: 'Template 3', size: '1080×1920' },
        ]
      },
      { id: 'age_transform', name: 'Age Transform', desc: 'AI age progression/regression', icon: '⏳',
        templates: [
          { code: 'tmpl1', name: 'Template 1 (New)', size: '1080×1920' },
          { code: 't1', name: 'Template 1', size: '1080×1920' },
        ]
      },
    ]
  },
];

const SAMPLE_IMGS = {
  main: 'https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=900&q=80',
  circle: 'https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=450&q=80',
};

let activeGroupId = null;
let checkedFeatures = new Set();
// selectedTpls: Map<string, {code, name, featureName}> — key = "featureId::code"
const selectedTpls = new Map();

// ===== RENDER GROUPS =====
function renderGroups() {
  const container = document.getElementById('group-chips');
  container.innerHTML = DATA.map(g => `
    <div class="group-chip" id="gchip-${g.id}" onclick="selectGroup('${g.id}')">
      <span class="group-chip-icon">${g.icon}</span>
      <div class="group-chip-text">
        <div class="group-chip-name">${g.name}</div>
        <div class="group-chip-count">${g.features.length} features</div>
      </div>
    </div>
  `).join('');
}

function selectGroup(id) {
  if (activeGroupId === id) {
    activeGroupId = null;
    document.getElementById('gchip-' + id).classList.remove('active');
    document.getElementById('feature-area').innerHTML = '';
    return;
  }
  if (activeGroupId) {
    const prev = document.getElementById('gchip-' + activeGroupId);
    if (prev) prev.classList.remove('active');
  }
  activeGroupId = id;
  document.getElementById('gchip-' + id).classList.add('active');
  checkedFeatures.clear();
  renderFeatures();
}

// ===== RENDER FEATURES =====
function renderFeatures() {
  const group = DATA.find(g => g.id === activeGroupId);
  if (!group) return;

  const area = document.getElementById('feature-area');
  area.innerHTML = `
    <div class="feature-section">
      <div class="section-label">${esc(group.name)} — Features</div>
      <div class="feature-search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="feature-search" id="feature-search" placeholder="Search features..." oninput="onFeatureSearch(this.value)">
      </div>
      <div class="feature-list" id="feature-list">
        ${group.features.map(f => `
          <div id="fwrap-${f.id}">
            <div class="feature-item" id="fitem-${f.id}" onclick="toggleFeature('${f.id}')">
              <div class="f-check">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
              </div>
              <span class="f-icon">${f.icon}</span>
              <div class="f-info">
                <div class="f-name">${esc(f.name)}</div>
                <div class="f-desc">${esc(f.desc)}</div>
              </div>
              <span class="f-badge">${f.templates.length} tpl</span>
            </div>
            <div class="tpl-expand" id="tpl-expand-${f.id}">
              <div class="tpl-row" id="tpl-row-${f.id}"></div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  // Restore expanded features & selected templates when switching groups back
  group.features.forEach(f => {
    if (checkedFeatures.has(f.id)) {
      document.getElementById('fitem-' + f.id)?.classList.add('checked');
      document.getElementById('tpl-expand-' + f.id)?.classList.add('open');
      renderTemplatesForFeature(f.id);
    }
  });
}

function toggleFeature(fid) {
  const item = document.getElementById('fitem-' + fid);
  const expand = document.getElementById('tpl-expand-' + fid);
  if (!item || !expand) return;

  if (checkedFeatures.has(fid)) {
    checkedFeatures.delete(fid);
    item.classList.remove('checked');
    expand.classList.remove('open');
  } else {
    checkedFeatures.add(fid);
    item.classList.add('checked');
    expand.classList.add('open');
    renderTemplatesForFeature(fid);
  }
}

function renderTemplatesForFeature(fid) {
  // Find feature across ALL groups
  let feature = null;
  for (const g of DATA) {
    feature = g.features.find(f => f.id === fid);
    if (feature) break;
  }
  if (!feature) return;

  const row = document.getElementById('tpl-row-' + fid);
  if (!row || row.children.length > 0) return;

  feature.templates.forEach(tpl => {
    const key = fid + '::' + tpl.code;
    const card = document.createElement('div');
    card.className = 'tpl-card' + (selectedTpls.has(key) ? ' selected' : '');
    card.id = 'tcard-' + key.replace('::', '-');
    const previewId = 'prev-' + fid + '-' + tpl.code;
    card.onclick = () => toggleTpl(fid, tpl.code, feature.name, tpl.name);
    card.innerHTML = `
      <div class="tpl-card-check">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="tpl-card-preview" id="${previewId}"></div>
      <div class="tpl-card-footer">
        <div class="tpl-card-name">${esc(tpl.name)}</div>
      </div>
    `;
    row.appendChild(card);

    requestAnimationFrame(() => {
      const box = document.getElementById(previewId);
      if (!box) return;
      const boxW = box.clientWidth || 140;
      const scale = boxW / 1080;
      const demoTitles = {
        'Make Up': 'Change Your\nMakeup',
        '2 Image to Image': 'See Your\nFuture Baby',
        'Mockup': 'Bring Photos\nTogether Naturally',
        'Text and Image to Video': 'Create Your\nStunning Portrait',
        'Restyle': 'See You In\nNew Style',
        'AI Multi Style': 'Multiple\nAI Styles',
        'Change Hair Style': 'Change Your\nHair Style',
        'Text to Image': 'Turn Words Into\nBeautiful Art',
        'Caller Lookup': 'Know Who\nIs Calling',
        'Spam Blocker': 'Block Spam\nCalls',
        'Call Recording': 'Record Every\nImportant Call',
        'VPN': 'Browse Safe\nAnd Private',
        'Phone Cleaner': 'Clean Your\nPhone Fast',
        'Face Swap': 'Swap Faces\nFor Fun',
        'Age Transform': 'See Your\nFuture Self',
        'Photo Enhance': 'Enhance Your\nPhotos',
        'AI Avatar': 'Create Your\nAI Avatar',
        'Background Remove': 'Remove Any\nBackground',
      };
      const demoTitle = demoTitles[feature.name] || 'Your Look\nToday';
      const iframe = document.createElement('iframe');
      iframe.style.width = '1080px';
      iframe.style.height = '1920px';
      iframe.style.transform = `scale(${scale})`;
      iframe.sandbox = 'allow-same-origin allow-scripts';
      iframe.src = `/preview/${tpl.code}?title=${encodeURIComponent(demoTitle)}`;
      box.appendChild(iframe);
    });
  });
}

// ===== TEMPLATE SELECTION =====
function toggleTpl(fid, code, featureName, tplName) {
  const key = fid + '::' + code;
  const cardId = 'tcard-' + key.replace('::', '-');
  const card = document.getElementById(cardId);

  if (selectedTpls.has(key)) {
    selectedTpls.delete(key);
    if (card) card.classList.remove('selected');
  } else {
    selectedTpls.set(key, { code, name: tplName, featureName });
    if (card) card.classList.add('selected');
  }
  updateBottomBar();
}

function updateBottomBar() {
  const bar = document.getElementById('bottom-bar');
  const count = selectedTpls.size;
  document.getElementById('sel-count').textContent = count;

  // Build tags
  const tags = document.getElementById('sel-tags');
  tags.innerHTML = [...selectedTpls.values()].map(t =>
    `<span class="bottom-bar-tag">${esc(t.featureName)} / ${esc(t.name)}</span>`
  ).join('');

  bar.classList.toggle('visible', count > 0);
}

function goEdit() {
  if (selectedTpls.size === 0) return;
  // Store selection in sessionStorage for multi-editor
  sessionStorage.setItem('selectedTemplates', JSON.stringify([...selectedTpls.entries()].map(([k, v]) => ({key: k, ...v}))));
  window.location.href = '/multi-editor.html';
}

// ===== SEARCH =====
function onGlobalSearch(query) {
  const q = query.toLowerCase().trim();
  const chips = document.querySelectorAll('.group-chip');

  if (!q) {
    // Show all groups
    chips.forEach(c => c.classList.remove('hide'));
    // If a group is active, also reset feature search
    const fs = document.getElementById('feature-search');
    if (fs) { fs.value = ''; onFeatureSearch(''); }
    return;
  }

  // Filter groups
  let anyGroupMatch = false;
  DATA.forEach(g => {
    const chip = document.getElementById('gchip-' + g.id);
    const groupMatch = g.name.toLowerCase().includes(q);
    const featureMatch = g.features.some(f => f.name.toLowerCase().includes(q) || f.desc.toLowerCase().includes(q));
    const show = groupMatch || featureMatch;
    chip.classList.toggle('hide', !show);
    if (show) anyGroupMatch = true;
  });

  // Also filter features if a group is active
  if (activeGroupId) {
    const group = DATA.find(g => g.id === activeGroupId);
    if (group) {
      group.features.forEach(f => {
        const item = document.getElementById('fitem-' + f.id);
        if (!item) return;
        const match = f.name.toLowerCase().includes(q) || f.desc.toLowerCase().includes(q);
        item.parentElement.classList.toggle('hide', !match);
        item.parentElement.style.display = match ? '' : 'none';
      });
    }
  }
}

function onFeatureSearch(query) {
  const q = query.toLowerCase().trim();
  const group = DATA.find(g => g.id === activeGroupId);
  if (!group) return;

  group.features.forEach(f => {
    const el = document.getElementById('fitem-' + f.id);
    if (!el) return;
    const match = !q || f.name.toLowerCase().includes(q) || f.desc.toLowerCase().includes(q);
    el.parentElement.style.display = match ? '' : 'none';
  });
}

// ===== UTILS =====
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ===== AUTH =====
async function loadUser() {
  try {
    const res = await fetch('/api/auth/me');
    if (!res.ok) return;
    const data = await res.json();
    const infoEl = document.getElementById('user-info');
    infoEl.style.display = 'flex';
    document.getElementById('user-name').textContent = data.user + (data.role === 'admin' ? ' (Admin)' : '');
    if (data.picture) document.getElementById('user-avatar').src = data.picture;
    else document.getElementById('user-avatar').style.display = 'none';
    if (data.role === 'admin') {
      document.getElementById('admin-link').style.display = '';
    }
  } catch {}
}

async function doLogout() {
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/login.html';
}

// ===== GENERATE FROM REFERENCE =====
let refFile = null;

function triggerRefUpload(e) {
  // Don't trigger if clicking inside body (controls area)
  if (document.getElementById('ref-gen-card').classList.contains('has-file')) return;
  document.getElementById('ref-file-input').click();
}

function onRefFileSelected(input) {
  if (!input.files[0]) return;
  refFile = input.files[0];
  const card = document.getElementById('ref-gen-card');
  card.classList.add('has-file');
  const reader = new FileReader();
  reader.onload = e => { document.getElementById('ref-thumb-img').src = e.target.result; };
  reader.readAsDataURL(refFile);
  // Reset result
  document.getElementById('ref-gen-result').classList.remove('show');
}

function clearRefImage(e) {
  e.stopPropagation();
  refFile = null;
  document.getElementById('ref-gen-card').classList.remove('has-file');
  document.getElementById('ref-file-input').value = '';
  document.getElementById('ref-thumb-img').src = '';
  document.getElementById('ref-gen-result').classList.remove('show');
  document.getElementById('ref-gen-status').innerHTML = '';
}

async function doRefGenerate(e) {
  e.stopPropagation();
  if (!refFile) return;

  const btn = document.getElementById('btn-ref-gen');
  const status = document.getElementById('ref-gen-status');
  const resultDiv = document.getElementById('ref-gen-result');

  btn.disabled = true;
  status.innerHTML = '<span class="ref-gen-spinner"><span class="dot"></span><span class="dot"></span><span class="dot"></span> Analyzing template & generating new assets...</span>';
  resultDiv.classList.remove('show');

  try {
    const fd = new FormData();
    fd.append('ref_image', refFile);
    fd.append('aspectRatio', document.getElementById('ref-aspect-ratio').value);
    fd.append('extraPrompt', document.getElementById('ref-extra-prompt').value);

    const res = await fetch('/api/gen-from-ref-image', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    // Show tagline
    document.getElementById('ref-result-tagline').textContent = data.tagline;
    document.getElementById('ref-result-tagline-orig').textContent = 'Original: ' + data.original_tagline;

    // Show images
    const imagesDiv = document.getElementById('ref-result-images');
    imagesDiv.innerHTML = data.images.map((img, i) => `
      <div style="flex-shrink:0">
        <div style="width:140px;border-radius:10px;overflow:hidden;background:#000;border:1px solid #27272a">
          <img src="${img.url}" style="width:100%;display:block">
        </div>
        <div style="margin-top:6px;display:flex;gap:4px;align-items:center">
          <span style="font-size:10px;color:#52525b">${esc(img.id)} · ${esc(img.position)}</span>
        </div>
        <a href="${img.url}" download="${img.id}.png" class="btn-download" style="margin-top:4px;display:block;font-size:11px;padding:6px 12px">Download</a>
      </div>
    `).join('');

    resultDiv.classList.add('show');
    status.innerHTML = '';
  } catch (err) {
    status.innerHTML = `<span style="color:#f87171;font-size:13px">Error: ${esc(err.message)}</span>`;
  } finally {
    btn.disabled = false;
  }
}

// ===== INIT =====
async function init() {
  loadUser();
  try {
    const res = await fetch('/api/data');
    const data = await res.json();
    if (data && data.length) DATA = data;
  } catch {}
  renderGroups();
}
init();
</script>
