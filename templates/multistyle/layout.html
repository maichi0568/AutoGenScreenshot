      font-weight: 800;
      font-size: 87.54px;
      line-height: 103px;
      text-transform: capitalize;
      background: linear-gradient(90deg, #f37878, #ffe9e9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-fill-color: transparent;
      white-space: nowrap;
      margin-bottom: 0;
      z-index: 2;

    .figma-title p { margin: 0; }
    .main-img-frame {

      width: 906px;
