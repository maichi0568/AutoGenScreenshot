<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup Template</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;800&display=swap">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;
      min-height: 1920px;
      min-width: 1080px;
      overflow-x: auto;
    }
    .template-bg {
      position: relative;
      width: 1080px;
      height: 1920px;
      margin: 0 auto;
      background: linear-gradient(180deg, #000 20.715%, #ff5858 55.485%, #f9a3a3 99.469%);
      overflow: hidden;
      font-family: 'Poppins', Arial, sans-serif;
    }
    .template-title {
      position: absolute;
      left: 50%;
      top: 181px;
      transform: translate(-50%, -50%);
      width: 900px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      font-weight: 800;
      font-size: 87.54px;
      line-height: 103px;
      text-transform: capitalize;
      background: linear-gradient(90deg, #f37878, #ffe9e9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: normal;
      word-wrap: break-word;
      z-index: 10;
    }
    .template-title p {
      margin: 0;
    }
    .phone-container {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 368px;
      width: 936px;
      height: 1552px;
      z-index: 1;
    }
    .phone-screenshot {
      position: absolute;
      left: 21px;
      top: 35px;
      width: 894px;
      height: 1519px;
      border-radius: 20px;
      overflow: hidden;
      z-index: 1;
    }
    .phone-screenshot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }
    .phone-frame {
      position: absolute;
      left: 0;
      top: 0;
      width: 936px;
      height: 1552px;
      z-index: 2;
      pointer-events: none;
    }
    .phone-frame img {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <div class="template-bg">
    <div class="template-title">
      <p>{{text_1}}</p>
    </div>
    <div class="phone-container">
      <div class="phone-screenshot">
        <img src="{{image_1}}" alt="App Screenshot">
      </div>
      <div class="phone-frame">
        <img src="{{file:phone-frame.svg}}" alt="Phone Frame">
      </div>
    </div>
  </div>
</body>
</html>
