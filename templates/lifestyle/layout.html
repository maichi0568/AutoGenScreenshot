<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1242px;
  height: 2688px;
  background: {{background}};
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.hero {
  width: 100%;
  height: 1400px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
.hero-image {
  width: 900px;
  height: 1300px;
  object-fit: cover;
  border-radius: 40px;
  box-shadow: 0 60px 120px rgba(0,0,0,0.3);
}
.ui-overlay {
  position: absolute;
  bottom: 60px;
  right: 80px;
  width: 420px;
  height: 700px;
  border-radius: 36px;
  overflow: hidden;
  box-shadow: 0 40px 80px rgba(0,0,0,0.4);
}
.ui-overlay img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 100px;
  text-align: center;
  gap: 40px;
}
.tagline {
  font-size: 96px;
  font-weight: 800;
  color: white;
  line-height: 1.1;
  letter-spacing: -2px;
  text-shadow: 0 4px 20px rgba(0,0,0,0.2);

  max-width: 1000px;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
.cta {
  font-size: 48px;
  font-weight: 500;
  color: rgba(255,255,255,0.8);
  letter-spacing: 2px;
  text-transform: uppercase;
}
.dots {
  display: flex;
  gap: 16px;
}
.dot {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
}
.dot.active {
  background: white;
  width: 48px;
  border-radius: 10px;
}
</style>
</head>
<body>
<div class="hero">
  <img class="hero-image" src="{{img1}}" alt="lifestyle" onerror="this.style.background='rgba(255,255,255,0.1)'"/>
  <div class="ui-overlay">
    <img src="{{ui}}" alt="ui" onerror="this.style.display='none'"/>
  </div>
</div>
<div class="content">
  <div class="tagline">{{tagline}}</div>
  <div class="cta">Download Now</div>
  <div class="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>
</body>
</html>
