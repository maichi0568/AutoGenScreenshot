<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>AI Creates Stunning Portraits</title>
	<style>
		@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;800&display=swap');
		html, body {
			height: 100%;
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}
		body {
			background: #000;
			min-height: 1920px;
			min-width: 1080px;
			overflow-x: auto;
		}
		.figma-bg {
			position: relative;
			width: 1080px;
			height: 1920px;
			margin: 0 auto;
			background: linear-gradient(180deg, #000 20.715%, #ff5858 55.485%, #f9a3a3 99.469%);
			overflow: hidden;
			font-family: 'Poppins', Arial, sans-serif;
		}
		.figma-title {
			position: absolute;
			left: 50%;
			top: 181.05px;
			transform: translate(-50%, -50%);
			display: flex;
			flex-direction: column;
			justify-content: center;
			text-align: center;
			font-family: 'Poppins', Arial, sans-serif;
			font-weight: 800;
			font-size: 87.54px;
			line-height: 103px;
			text-transform: capitalize;
			background: linear-gradient(90deg, #f37878, #ffe9e9);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			background-clip: text;
			text-fill-color: transparent;
			white-space: nowrap;
			margin-bottom: 0;
			z-index: 2;
		}
		.figma-title p {
			margin: 0;
		}
		.main-img-container {
			position: absolute;
			left: 87px;
			top: 368px;
			width: 906px;
			height: 1708px;
			border: 12px solid #fe9d9c;
			border-radius: 80px 80px 0 0;
			overflow: clip;
			background: #fff;
			z-index: 1;
		}
		.main-img {
			position: absolute;
			left: 0px;
			top: 0px;
			width: 929.97px;
			height: 1568.56px;
			pointer-events: none;
			overflow: hidden;
		}
		.main-img img {
			position: absolute;
			left: -16.25%;
			top: -2.14%;
			width: 125.68%;
			height: 102.14%;
			max-width: none;
		}
		.desc-bg {
			position: absolute;
			left: 42.66px;
			top: 1542.84px;
			width: 1008.88px;
			height: 331.06px;
			background: rgba(229,43,43,0.8);
			border: 2px solid #fff;
			border-radius: 40px;
			z-index: 2;
		}
		.play-btn-container {
			position: absolute;
			left: 440px;
			top: 1145.91px;
			width: 200px;
			height: 200px;
			overflow: clip;
			z-index: 3;
		}
		.play-btn-container img {
			width: 100%;
			height: 100%;
			display: block;
		}
		.desc-text {
			position: absolute;
			left: 140.87px;
			top: 1587.71px;
			width: 873.49px;
			color: #fff;
			font-family: 'Poppins', Arial, sans-serif;
			font-size: 34.27px;
			line-height: 1.7;
			font-weight: 400;
			letter-spacing: 0.34px;
			z-index: 4;
		}
		.circle-img-container {
			position: absolute;
			left: calc(50% + 414px);
			top: 425.9px;
			transform: translateX(-50%);
			width: 445.44px;
			height: 445.44px;
			background: #bcaf9c;
			border: 6.46px solid #fe9d9c;
			border-radius: 50%;
			overflow: clip;
			box-shadow: 21px -27px 25.21px 0px rgba(0,0,0,0.17), 21.01px 25.21px 25.21px 0px rgba(0,0,0,0.1);
			z-index: 2;
		}
		.circle-img-inner {
			position: absolute;
			left: 0px;
			top: 0px;
			width: 446px;
			height: 446px;
			/* transform: translateY(-50%) rotate(180deg) scaleY(-1); */
			display: flex;
			align-items: center;
			justify-content: center;
		}
		.circle-img-inner img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			pointer-events: none;
			max-width: none;
		}
		.group-img-container {
			position: absolute;
			left: 847px;
			top: 830px;
			width: 189.77px;
			height: 174.33px;
			transform: rotate(160.04deg) scale(-1X);
			display: flex;
			align-items: center;
			justify-content: center;
			z-index: 5;
		}
		.group-img-container img {
			width: 100%;
			height: 100%;
			display: block;
		}
	</style>
