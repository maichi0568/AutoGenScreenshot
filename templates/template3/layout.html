<!DOCTYPE html>

      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;

    .template-bg {
      position: relative;

    .main-img-grid {

      height: 1694px;
      border: 10px solid #fe9d9c;
      border-radius: 100px;
      overflow: hidden;
      background: none;
      z-index: 1;
    }
    .img-block {
      position: absolute;
      overflow: hidden;
      border-radius: 0;
      background: none;
    }
    .img-block img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;

      border-bottom: none;
    }
    .img-inner-1,
