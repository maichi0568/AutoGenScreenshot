<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1242px;
  height: 2688px;
  background: {{background}};
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  overflow: hidden;
  position: relative;
}
.bg-gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(160deg, transparent 30%, rgba(0,0,0,0.6) 100%);
}
.hero-img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 65%;
  object-fit: cover;
}
.ui-frame {
  position: absolute;
  top: 300px;
  right: 80px;
  width: 460px;
  height: 820px;
  border-radius: 44px;
  overflow: hidden;
  border: 4px solid rgba(255,255,255,0.3);
  box-shadow: 0 60px 120px rgba(0,0,0,0.6);
  backdrop-filter: blur(2px);
}
.ui-frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.content {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 45%;
  padding: 80px 100px 160px;
  background: linear-gradient(to bottom, transparent, {{background}} 30%);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  gap: 40px;
}
.badge {
  display: inline-flex;
  align-items: center;
  gap: 16px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding: 16px 36px;
  border-radius: 60px;
  width: fit-content;
  border: 1px solid rgba(255,255,255,0.2);
}
.badge-text {
  font-size: 32px;
  color: white;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
}
.tagline {
  font-size: 120px;
  font-weight: 900;
  color: white;
  line-height: 1.0;
  letter-spacing: -4px;

  max-width: 1000px;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
.cta-row {
  display: flex;
  align-items: center;
  gap: 40px;
}
.cta-btn {
  background: white;
  color: {{background}};
  padding: 36px 80px;
  border-radius: 60px;
  font-size: 44px;
  font-weight: 700;
}
.stores {
  font-size: 32px;
  color: rgba(255,255,255,0.6);
}
</style>
</head>
<body>
<img class="hero-img" src="{{img1}}" alt="hero" onerror="this.style.background='rgba(255,255,255,0.1)'"/>
<div class="bg-gradient"></div>
<div class="ui-frame">
  <img src="{{ui}}" alt="UI" onerror="this.style.display='none'"/>
</div>
<div class="content">
  <div class="badge">
    <span style="font-size:36px">&#127942;</span>
    <span class="badge-text">App of the Year</span>
  </div>
  <div class="tagline">{{tagline}}</div>
  <div class="cta-row">
    <div class="cta-btn">Get Started</div>
    <div class="stores">iOS &amp; Android</div>
  </div>
</div>
</body>
</html>
